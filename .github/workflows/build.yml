name: Build Standalone Executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            exe_cli: ipasideloader
            exe_gui: ipasideloader-gui
            asset_name: ipasideloader-linux-x86_64
          - os: windows-latest
            platform: windows
            exe_cli: ipasideloader.exe
            exe_gui: ipasideloader-gui.exe
            asset_name: ipasideloader-windows-x86_64
          - os: macos-13
            platform: macos
            exe_cli: ipasideloader
            exe_gui: ipasideloader-gui
            asset_name: ipasideloader-macos-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies + PyInstaller
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ── zsign (Linux) ────────────────────────────────────────────────────────
      - name: Build zsign (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake build-essential libssl-dev zlib1g-dev
          git clone --depth 1 https://github.com/zhlynn/zsign.git /tmp/zsign
          cmake -S /tmp/zsign -B /tmp/zsign/build -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/zsign/build --parallel
          mkdir -p dist_tools
          cp /tmp/zsign/build/zsign dist_tools/zsign
          chmod +x dist_tools/zsign

      # ── zsign (macOS) ────────────────────────────────────────────────────────
      - name: Build zsign (macOS)
        if: matrix.platform == 'macos'
        run: |
          brew install cmake openssl@3 zlib
          git clone --depth 1 https://github.com/zhlynn/zsign.git /tmp/zsign
          cmake -S /tmp/zsign -B /tmp/zsign/build \
            -DCMAKE_BUILD_TYPE=Release \
            -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3)
          cmake --build /tmp/zsign/build --parallel
          mkdir -p dist_tools
          cp /tmp/zsign/build/zsign dist_tools/zsign
          chmod +x dist_tools/zsign

      # ── zsign (Windows) ──────────────────────────────────────────────────────
      - name: Build zsign (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
          git clone --depth 1 https://github.com/zhlynn/zsign.git C:\zsign
          cmake -S C:\zsign -B C:\zsign\build
          cmake --build C:\zsign\build --config Release
          New-Item -ItemType Directory -Force dist_tools
          Copy-Item C:\zsign\build\Release\zsign.exe dist_tools\zsign.exe

      # ── ldid (Linux) ─────────────────────────────────────────────────────────
      - name: Download ldid (Linux)
        if: matrix.platform == 'linux'
        run: |
          LDID_URL=$(curl -s https://api.github.com/repos/ProcursusTeam/ldid/releases/latest \
            | grep "browser_download_url" | grep "linux_x86_64" | cut -d'"' -f4 | head -1)
          if [ -n "$LDID_URL" ]; then
            curl -L "$LDID_URL" -o dist_tools/ldid
            chmod +x dist_tools/ldid
          else
            echo "ldid prebuilt not found for Linux, skipping"
          fi

      # ── ldid (macOS) ─────────────────────────────────────────────────────────
      - name: Install ldid (macOS)
        if: matrix.platform == 'macos'
        run: |
          brew install ldid
          cp $(which ldid) dist_tools/ldid
          chmod +x dist_tools/ldid

      # ── ldid (Windows — not applicable) ─────────────────────────────────────
      - name: ldid note (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          Write-Host "ldid is not supported on Windows; zsign is the signing backend for this platform."

      # ── PyInstaller: CLI ─────────────────────────────────────────────────────
      - name: Build CLI executable
        run: |
          pyinstaller --onefile --name ipasideloader \
            --hidden-import=pymobiledevice3 \
            --hidden-import=pymobiledevice3.services \
            --hidden-import=pymobiledevice3.lockdown \
            --hidden-import=pymobiledevice3.usbmux \
            --hidden-import=zeroconf \
            --hidden-import=construct \
            --hidden-import=cryptography \
            --hidden-import=Anisette \
            --hidden-import=srp \
            --collect-all pymobiledevice3 \
            --collect-all Anisette \
            ipasideloader/cli.py

      # ── PyInstaller: GUI ─────────────────────────────────────────────────────
      - name: Build GUI executable
        run: |
          pyinstaller --onefile --name ipasideloader-gui \
            --hidden-import=tkinter \
            --hidden-import=tkinter.ttk \
            --hidden-import=tkinter.messagebox \
            --hidden-import=pymobiledevice3 \
            --hidden-import=pymobiledevice3.services \
            --hidden-import=pymobiledevice3.lockdown \
            --hidden-import=pymobiledevice3.usbmux \
            --hidden-import=zeroconf \
            --hidden-import=construct \
            --hidden-import=cryptography \
            --hidden-import=Anisette \
            --hidden-import=srp \
            --collect-all pymobiledevice3 \
            --collect-all Anisette \
            ipasideloader/gui/app.py

      # ── Package everything into a zip ────────────────────────────────────────
      - name: Package release zip (Linux / macOS)
        if: matrix.platform != 'windows'
        run: |
          mkdir -p release_pkg
          cp dist/ipasideloader release_pkg/
          cp dist/ipasideloader-gui release_pkg/
          [ -f dist_tools/zsign ] && cp dist_tools/zsign release_pkg/ || true
          [ -f dist_tools/ldid  ] && cp dist_tools/ldid  release_pkg/ || true
          cp README.md release_pkg/
          cd release_pkg
          zip -r ../${{ matrix.asset_name }}.zip .
          cd ..

      - name: Package release zip (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release_pkg
          Copy-Item dist\ipasideloader.exe release_pkg\
          Copy-Item dist\ipasideloader-gui.exe release_pkg\
          if (Test-Path dist_tools\zsign.exe) { Copy-Item dist_tools\zsign.exe release_pkg\ }
          Copy-Item README.md release_pkg\
          Compress-Archive -Path release_pkg\* -DestinationPath "${{ matrix.asset_name }}.zip"

      # ── Upload to GitHub Release ─────────────────────────────────────────────
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.asset_name }}.zip
          generate_release_notes: true

      - name: Upload build artifact (non-tag runs)
        uses: actions/upload-artifact@v4
        if: "!startsWith(github.ref, 'refs/tags/')"
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.zip
          retention-days: 7
