name: Build Standalone Executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            asset_name: ipasideloader-linux-x86_64
          - os: windows-latest
            platform: windows
            asset_name: ipasideloader-windows-x86_64
          - os: macos-13
            platform: macos
            asset_name: ipasideloader-macos-x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── MSBuild path (Windows only, needed before zsign build) ────────────────
      - name: Setup MSBuild (Windows)
        if: matrix.platform == 'windows'
        uses: microsoft/setup-msbuild@v2

      - name: Install Python dependencies + PyInstaller
        shell: bash
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ── zsign (Linux) — Makefile lives in build/linux/ ────────────────────────
      - name: Build zsign (Linux)
        if: matrix.platform == 'linux'
        continue-on-error: true
        shell: bash
        run: |
          sudo apt-get update -q
          sudo apt-get install -y build-essential libssl-dev pkg-config zlib1g-dev
          git clone --depth 1 https://github.com/zhlynn/zsign.git /tmp/zsign
          cd /tmp/zsign/build/linux
          make
          mkdir -p "$GITHUB_WORKSPACE/dist_tools"
          cp ../../bin/zsign "$GITHUB_WORKSPACE/dist_tools/zsign"
          chmod +x "$GITHUB_WORKSPACE/dist_tools/zsign"

      # ── zsign (macOS) — Makefile lives in build/macos/ ───────────────────────
      - name: Build zsign (macOS)
        if: matrix.platform == 'macos'
        continue-on-error: true
        shell: bash
        run: |
          brew install openssl@3 pkg-config
          export PKG_CONFIG_PATH="$(brew --prefix openssl@3)/lib/pkgconfig:$PKG_CONFIG_PATH"
          git clone --depth 1 https://github.com/zhlynn/zsign.git /tmp/zsign
          cd /tmp/zsign/build/macos
          make
          mkdir -p "$GITHUB_WORKSPACE/dist_tools"
          cp ../../bin/zsign "$GITHUB_WORKSPACE/dist_tools/zsign"
          chmod +x "$GITHUB_WORKSPACE/dist_tools/zsign"

      # ── zsign (Windows) — VS2022 solution, OpenSSL bundled in repo ────────────
      - name: Build zsign (Windows)
        if: matrix.platform == 'windows'
        continue-on-error: true
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/zhlynn/zsign.git C:\zsign
          msbuild C:\zsign\build\windows\vs2022\zsign.sln `
            /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 `
            /m /nologo
          New-Item -ItemType Directory -Force dist_tools
          Copy-Item C:\zsign\build\windows\vs2022\x64\Release\zsign.exe dist_tools\zsign.exe

      # ── ldid (Linux) — prebuilt static binary ────────────────────────────────
      - name: Download ldid (Linux)
        if: matrix.platform == 'linux'
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p dist_tools
          LDID_URL=$(curl -s https://api.github.com/repos/ProcursusTeam/ldid/releases/latest \
            | grep "browser_download_url" | grep "linux_x86_64" | cut -d'"' -f4 | head -1)
          if [ -n "$LDID_URL" ]; then
            curl -fsSL "$LDID_URL" -o dist_tools/ldid
            chmod +x dist_tools/ldid
          fi

      # ── ldid (macOS) ─────────────────────────────────────────────────────────
      - name: Install ldid (macOS)
        if: matrix.platform == 'macos'
        continue-on-error: true
        shell: bash
        run: |
          mkdir -p dist_tools
          brew install ldid
          cp "$(which ldid)" dist_tools/ldid
          chmod +x dist_tools/ldid

      # ── Ensure dist_tools exists ──────────────────────────────────────────────
      - name: Ensure dist_tools exists
        shell: bash
        run: mkdir -p dist_tools

      # ── PyInstaller: CLI (Linux / macOS) ─────────────────────────────────────
      - name: Build CLI executable (Linux / macOS)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          pyinstaller --onefile --name ipasideloader \
            --hidden-import=pymobiledevice3 \
            --hidden-import=pymobiledevice3.services \
            --hidden-import=pymobiledevice3.lockdown \
            --hidden-import=pymobiledevice3.usbmux \
            --hidden-import=zeroconf \
            --hidden-import=construct \
            --hidden-import=cryptography \
            --hidden-import=Anisette \
            --hidden-import=srp \
            --collect-all pymobiledevice3 \
            --collect-all Anisette \
            ipasideloader/cli.py

      # ── PyInstaller: CLI (Windows) ────────────────────────────────────────────
      - name: Build CLI executable (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          pyinstaller --onefile --name ipasideloader `
            --hidden-import=pymobiledevice3 `
            --hidden-import=pymobiledevice3.services `
            --hidden-import=pymobiledevice3.lockdown `
            --hidden-import=pymobiledevice3.usbmux `
            --hidden-import=zeroconf `
            --hidden-import=construct `
            --hidden-import=cryptography `
            --hidden-import=Anisette `
            --hidden-import=srp `
            --collect-all pymobiledevice3 `
            --collect-all Anisette `
            ipasideloader/cli.py

      # ── PyInstaller: GUI (Linux / macOS) ─────────────────────────────────────
      - name: Build GUI executable (Linux / macOS)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          pyinstaller --onefile --name ipasideloader-gui \
            --hidden-import=tkinter \
            --hidden-import=tkinter.ttk \
            --hidden-import=tkinter.messagebox \
            --hidden-import=pymobiledevice3 \
            --hidden-import=pymobiledevice3.services \
            --hidden-import=pymobiledevice3.lockdown \
            --hidden-import=pymobiledevice3.usbmux \
            --hidden-import=zeroconf \
            --hidden-import=construct \
            --hidden-import=cryptography \
            --hidden-import=Anisette \
            --hidden-import=srp \
            --collect-all pymobiledevice3 \
            --collect-all Anisette \
            ipasideloader/gui/app.py

      # ── PyInstaller: GUI (Windows) ────────────────────────────────────────────
      - name: Build GUI executable (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          pyinstaller --onefile --name ipasideloader-gui `
            --hidden-import=tkinter `
            --hidden-import=tkinter.ttk `
            --hidden-import=tkinter.messagebox `
            --hidden-import=pymobiledevice3 `
            --hidden-import=pymobiledevice3.services `
            --hidden-import=pymobiledevice3.lockdown `
            --hidden-import=pymobiledevice3.usbmux `
            --hidden-import=zeroconf `
            --hidden-import=construct `
            --hidden-import=cryptography `
            --hidden-import=Anisette `
            --hidden-import=srp `
            --collect-all pymobiledevice3 `
            --collect-all Anisette `
            ipasideloader/gui/app.py

      # ── Package (Linux / macOS) ───────────────────────────────────────────────
      - name: Package release zip (Linux / macOS)
        if: matrix.platform != 'windows'
        shell: bash
        run: |
          mkdir -p release_pkg
          cp dist/ipasideloader     release_pkg/
          cp dist/ipasideloader-gui release_pkg/
          [ -f dist_tools/zsign ] && cp dist_tools/zsign release_pkg/ || true
          [ -f dist_tools/ldid  ] && cp dist_tools/ldid  release_pkg/ || true
          cp README.md release_pkg/
          cd release_pkg && zip -r "../${{ matrix.asset_name }}.zip" . && cd ..

      # ── Package (Windows) ─────────────────────────────────────────────────────
      - name: Package release zip (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release_pkg
          Copy-Item dist\ipasideloader.exe     release_pkg\
          Copy-Item dist\ipasideloader-gui.exe release_pkg\
          if (Test-Path dist_tools\zsign.exe) { Copy-Item dist_tools\zsign.exe release_pkg\ }
          Copy-Item README.md release_pkg\
          Compress-Archive -Path release_pkg\* -DestinationPath "${{ matrix.asset_name }}.zip"

      # ── Upload to GitHub Release ──────────────────────────────────────────────
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.asset_name }}.zip
          generate_release_notes: true

      - name: Upload build artifact (non-tag runs)
        uses: actions/upload-artifact@v4
        if: "!startsWith(github.ref, 'refs/tags/')"
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}.zip
          retention-days: 7
